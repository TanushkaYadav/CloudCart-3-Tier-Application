apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  labels:
    app: auth-service
    tags.datadoghq.com/env: dev
    tags.datadoghq.com/service: auth-service
    tags.datadoghq.com/version: 1.0.0
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
        tags.datadoghq.com/env: dev
        tags.datadoghq.com/service: auth-service
        tags.datadoghq.com/version: 1.0.0
        admission.datadoghq.com/enabled: "true"
    spec:
      containers:
        - name: auth-service
          image: 933516006319.dkr.ecr.eu-west-1.amazonaws.com/backend/auth-service:latest
          imagePullPolicy: Always
          env:
            - name: DD_LOGS_INJECTION
              value: "true"
          ports:
            - containerPort: 8081
          resources:
            requests:
              memory: 256Mi
              cpu: 250m
            limits:
              memory: 512Mi
              cpu: 500m
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  labels:
    app: auth-service
spec:
  type: ClusterIP
  selector:
    app: auth-service
  ports:
    - port: 8081
      targetPort: 8081
      protocol: TCP
